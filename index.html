<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Wave Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Custom Properties for easy theme management */
        :root {
            --bg-color: #0d0f12;
            --container-bg: #161a22;
            --accent-color: #ff3e3e;
            --accent-glow: rgba(255, 62, 62, 0.4);
            --text-main: #f0f2f5;
            --text-muted: #8a99ad;
            --border-color: #262c3a;
        }

        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            /* Subtle background grid pattern for a tech/game feel */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Centered Container Box */
        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 30px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        0 0 50px rgba(255, 62, 62, 0.05);
            backdrop-filter: blur(8px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        0 0 60px rgba(255, 62, 62, 0.1);
        }

        /* Main Header */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 15px;
            color: var(--text-main);
            /* Crimson neon glow effect */
            text-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
        }

        /* Tagline / Subtitle */
        .tagline {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* Game Stats / Features Preview */
        .game-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 35px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        /* Call to Action Button */
        .btn-play {
            display: inline-block;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            padding: 16px 40px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: all 0.2s ease;
        }

        .btn-play:hover {
            background-color: #ff5757;
            box-shadow: 0 6px 25px rgba(255, 62, 62, 0.6);
            transform: scale(1.02);
        }

        .btn-play:active {
            transform: scale(0.98);
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            .container {
                padding: 30px 20px;
            }
            .game-meta {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Survival Game</h1>
        <p class="tagline">The waves are coming. How long will you stand against the endless crimson tide?</p>
        
        <div class="game-meta">
            <div class="stat-box">
                <span class="stat-label">Game Mode</span>
                <span class="stat-value">Wave Survival</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Difficulty</span>
                <span class="stat-value">Hardcore</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Current Version</span>
                <span class="stat-value">v1.0.4</span>
            </div>
        </div>

        <button class="btn-play">Enter the Arena</button>
    </div>

</body>
</html>
