<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Arena: Ultimate Universal Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-color: #ff00ff;
            --player-color: #00ffaa;
            --hud-bg: rgba(15, 5, 25, 0.85);
            --border-color: #ff00ff;
            --text-main: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #04010a;
            font-family: 'Orbitron', Arial, sans-serif;
            color: var(--text-main);
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(15, 5, 25, 0.95) 0%, rgba(5, 0, 10, 1) 100%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--player-color);
            text-shadow: 0 0 20px var(--accent-color);
        }

        .tagline {
            font-size: 1rem;
            color: #e0aaff;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn-action {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            border: 3px solid var(--player-color);
            border-radius: 4px;
            padding: 16px 40px;
            cursor: pointer;
            background-color: rgba(0, 255, 170, 0.15);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.2);
        }

        .btn-action:hover {
            background-color: var(--player-color);
            color: #000;
            box-shadow: 0 0 30px var(--player-color);
        }

        #gameover-overlay { display: none; }
        #gameover-title { color: #ff0055; text-shadow: 0 0 30px #ff0055; }

        #hud-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .hud-card {
            background: var(--hud-bg);
            border: 2px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 6px;
            color: var(--player-color);
            font-weight: bold;
            font-size: 0.9rem;
        }

        .hud-card span { color: #fff; margin-left: 5px; }
        #health-card { border-color: var(--player-color); color: var(--accent-color); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="game-canvas"></canvas>

    <div id="menu-overlay" class="screen-overlay">
        <h1>NEON ARENA</h1>
        <p class="tagline">Universal Light Grid. Outlast and disintegrate incoming target vectors. Works flawlessly on all desktop & mobile setups.</p>
        <button class="btn-action" id="start-btn">INITIALIZE GRID</button>
    </div>

    <div id="gameover-overlay" class="screen-overlay">
        <h1 id="gameover-title">GRID TERMINATED</h1>
        <p class="tagline" id="summary-metrics">Processing matrix calculations...</p>
        <button class="btn-action" id="retry-btn">REBOOT SYSTEM</button>
    </div>

    <div id="hud-overlay">
        <div class="hud-row">
            <div class="hud-card">WAVE: <span id="wave-idx">1</span></div>
            <div class="hud-card">SCORE: <span id="score-idx">0</span></div>
        </div>
        <div class="hud-row">
            <div class="hud-card" id="health-card">INTEGRITY: <span id="health-display">100%</span></div>
            <div class="hud-card">ENGINE: <span style="color:#00ffaa;">NATIVE</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let gameActive = false;
        let player = { x: 0, y: 0, radius: 15, speed: 4 };
        let keys = {};
        let enemies = [];
        let projectiles = [];
        let particles = [];
        let score = 0;
        let currentWave = 1;
        let playerHealth = 100;
        let spawnInterval;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (!gameActive && player.x === 0) {
                player.x = canvas.width / 2;
                player.y = canvas.height / 2;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Universal Inputs
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Mouse click/tap fire handler
        window.addEventListener('pointerdown', e => {
            if (!gameActive || e.target.tagName === 'BUTTON') return;
            fireProjectile(e.clientX, e.clientY);
        });

        // Touch move handling (directly transforms tracking coordinates)
        window.addEventListener('pointermove', e => {
            if (!gameActive || e.target.tagName === 'BUTTON') return;
            if (e.pointerType === 'touch') {
                // On mobile touch screens, move directly toward last touch point
                const dx = e.clientX - player.x;
                const dy = e.clientY - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 10) {
                    player.x += (dx / dist) * player.speed;
                    player.y += (dy / dist) * player.speed;
                }
            }
        });

        document.getElementById('start-btn').addEventListener('click', bootEngine);
        document.getElementById('retry-btn').addEventListener('click', bootEngine);

        function bootEngine() {
            document.getElementById('menu-overlay').classList.add('hidden');
            document.getElementById('gameover-overlay').style.display = 'none';
            document.getElementById('hud-overlay').style.display = 'flex';

            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            enemies = [];
            projectiles = [];
            particles = [];
            score = 0;
            currentWave = 1;
            playerHealth = 100;
            gameActive = true;

            updateHUD();
            startSpawning();
            requestAnimationFrame(renderLoop);
        }

        function updateHUD() {
            document.getElementById('wave-idx').textContent = currentWave;
            document.getElementById('health-display').textContent = playerHealth + "%";
            document.getElementById('score-idx').textContent = score;
        }

        function fireProjectile(targetX, targetY) {
            const angle = Math.atan2(targetY - player.y, targetX - player.x);
            projectiles.push({
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 8,
                vy: Math.sin(angle) * 8,
                radius: 4
            });
        }

        function startSpawning() {
            clearInterval(spawnInterval);
            let delay = Math.max(400, 1500 - (currentWave * 100));
            spawnInterval = setInterval(() => {
                if (!gameActive) return;

                let x, y;
                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                    y = Math.random() * canvas.height;
                } else {
                    x = Math.random() * canvas.width;
                    y = Math.random() < 0.5 ? -20 : canvas.height + 20;
                }

                enemies.push({
                    x: x,
                    y: y,
                    radius: 12 + Math.random() * 8,
                    speed: 1.5 + (currentWave * 0.15)
                });
            }, delay);
        }

        function burstParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    color: color
                });
            }
        }

        function renderLoop() {
            if (!gameActive) return;
            requestAnimationFrame(renderLoop);

            // Clear Frame Grid
            ctx.fillStyle = 'rgba(4, 1, 10, 0.3)'; // Neon trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Background cyber line grid
            ctx.strokeStyle = '#16082b';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }

            // Desktop Keyboard Translation
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // Bounds Clamping
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));

            // Render Player Core
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffaa';
            ctx.fillStyle = '#00ffaa';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // Projectile Processing loop
            ctx.shadowColor = '#00ffaa';
            ctx.fillStyle = '#00ffaa';
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx; p.y += p.vy;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();

                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    projectiles.splice(i, 1);
                }
            }

            // Fragment Particles loop
            ctx.shadowBlur = 0;
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // Hostiles Matrix processing loop
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = '#ff00ff';
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let angle = Math.atan2(player.y - e.y, player.x - e.x);
                e.x += Math.cos(angle) * e.speed;
                e.y += Math.sin(angle) * e.speed;

                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fill();

                // Player impact check
                let distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                if (distToPlayer < player.radius + e.radius) {
                    playerHealth -= 10;
                    burstParticles(e.x, e.y, '#ff00ff');
                    enemies.splice(i, 1);
                    updateHUD();
                    if (playerHealth <= 0) gameOver();
                    continue;
                }

                // Bullet hit checks
                for (let j = projectiles.length - 1; j >= 0; j--) {
                    let p = projectiles[j];
                    if (Math.hypot(p.x - e.x, p.y - e.y) < e.radius + p.radius) {
                        burstParticles(e.x, e.y, '#ff00ff');
                        enemies.splice(i, 1);
                        projectiles.splice(j, 1);
                        score += 100;
                        if (score % 1000 === 0) {
                            currentWave++;
                            startSpawning();
                        }
                        updateHUD();
                        break;
                    }
                }
            }
            ctx.shadowBlur = 0; // Clear shadow buffer state
        }

        function gameOver() {
            gameActive = false;
            clearInterval(spawnInterval);
            document.getElementById('hud-overlay').style.display = 'none';
            document.getElementById('summary-metrics').textContent = `Link severed on Wave ${currentWave}. Core score evaluation: ${score}.`;
            document.getElementById('gameover-overlay').style.display = 'flex';
        }
    </script>
</body>
</html>
