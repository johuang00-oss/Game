<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Mobile Survival Wave Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-color: #0d0f12;
            --container-bg: #161a22;
            --accent-color: #ff3e3e;
            --accent-glow: rgba(255, 62, 62, 0.4);
            --text-main: #f0f2f5;
            --text-muted: #8a99ad;
            --border-color: #262c3a;
            --player-color: #3effbe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
            -webkit-touch-callout: none;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px 20px;
            max-width: 750px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .tagline {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .game-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 8px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .btn-play {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #ffffff;
            background-color: var(--accent-color);
            border: none;
            border-radius: 8px;
            padding: 14px 30px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* Game Screen Layout */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .game-ui {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
        }

        .ui-element {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .ui-element span {
            color: var(--accent-color);
            font-weight: bold;
        }

        #health-display {
            color: var(--player-color) !important;
        }

        #canvas-container {
            width: 100%;
            aspect-ratio: 16 / 10;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            position: relative;
        }

        #canvas-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 15, 18, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #overlay-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        /* Virtual Mobile Touch Joystick styles */
        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 5;
            backdrop-filter: blur(4px);
        }

        #joystick-knob {
            width: 36px;
            height: 36px;
            background: var(--player-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--player-color);
            transition: transform 0.05s linear;
        }

        .instructions {
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div id="menu-screen">
            <h1>Survival Game</h1>
            <p class="tagline">The waves are coming. Cross-platform 3D action optimized for mobile touch & desktop.</p>
            
            <div class="game-meta">
                <div class="stat-box">
                    <span class="stat-label">Controls</span>
                    <span class="stat-value" style="color: var(--player-color)">Touch / WASD</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Mobile</span>
                    <span class="stat-value" style="color: #a855f7">Joystick UI</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Engine</span>
                    <span class="stat-value">Three.js</span>
                </div>
            </div>

            <button class="btn-play" id="start-btn">Enter the Arena</button>
        </div>

        <div id="game-screen">
            <div class="game-ui">
                <div class="ui-element">Wave: <span id="wave-idx">1</span></div>
                <div class="ui-element">HP: <span id="health-display">100</span></div>
                <div class="ui-element">Score: <span id="score-idx">0</span></div>
            </div>
            
            <div id="canvas-container">
                <div id="canvas-overlay">
                    <h2 id="overlay-title">GAME OVER</h2>
                    <p id="overlay-text">Summary metrics show up here.</p>
                    <button class="btn-play" id="retry-btn" style="width: auto; margin-top: 15px; padding: 10px 25px;">Play Again</button>
                </div>

                <div id="joystick-zone">
                    <div id="joystick-knob"></div>
                </div>
            </div>
            
            <p class="instructions" id="control-text">Move: Left Stick. Shoot: Tap anywhere on the right side arena grid.</p>
        </div>
    </div>

    <script>
        // DOM Elements
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const canvasContainer = document.getElementById('canvas-container');
        const canvasOverlay = document.getElementById('canvas-overlay');
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        const controlText = document.getElementById('control-text');
        
        const waveDisplay = document.getElementById('wave-idx');
        const healthDisplay = document.getElementById('health-display');
        const scoreDisplay = document.getElementById('score-idx');

        // Three.js Core Variables
        let scene, camera, renderer, playerObj;
        
        // Game Lists & Logic Tracking
        let projectiles = []; let enemies = []; let particles = [];
        let keys = {}; let gameActive = false;
        let currentWave = 1; let score = 0; let playerHealth = 100;
        let spawnTimer;

        const ARENA_SIZE = 30;

        // Mobile Touch Joystick Tracking Metrics
        let isMobile = false;
        let joystickActive = false;
        let joystickStart = { x: 0, y: 0 };
        let moveVector = new THREE.Vector3(0, 0, 0); 

        // Raycasting components for aiming mechanics
        const raycaster = new THREE.Raycaster();
        const pointer2D = new THREE.Vector2();
        const planeTarget = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

        // Detect Touch Capability Interface
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            isMobile = true;
            joystickZone.style.display = 'flex';
            controlText.textContent = "Move: Drag the Virtual Joystick. Shoot: Tap anywhere else on screen.";
        }

        // Desktop Keyboard Listeners
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function updatePointerCoordinates(clientX, clientY) {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer2D.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            pointer2D.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        }

        window.addEventListener('mousemove', e => {
            if (isMobile) return;
            updatePointerCoordinates(e.clientX, e.clientY);
        });

        window.addEventListener('mousedown', (e) => {
            if (!gameActive || isMobile || e.target.tagName === 'BUTTON') return;
            fireProjectile();
        });

        // Mobile Touch Input Tracing Logic
        canvasContainer.addEventListener('touchstart', e => {
            if (!gameActive) return;
            
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                const rect = joystickZone.getBoundingClientRect();
                
                const distToJoystick = Math.hypot(
                    touch.clientX - (rect.left + rect.width/2),
                    touch.clientY - (rect.top + rect.height/2)
                );

                if (distToJoystick < rect.width * 0.9 && !joystickActive) {
                    joystickActive = true;
                    joystickStart.x = touch.clientX;
                    joystickStart.y = touch.clientY;
                } else if (e.target.tagName !== 'BUTTON') {
                    updatePointerCoordinates(touch.clientX, touch.clientY);
                    fireProjectile();
                }
            }
        }, { passive: true });

        canvasContainer.addEventListener('touchmove', e => {
            if (!gameActive || !joystickActive) return;

            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                const dx = touch.clientX - joystickStart.x;
                const dy = touch.clientY - joystickStart.y;
                const distance = Math.hypot(dx, dy);
                const maxRadius = 45; 

                if (distance > 0) {
                    const angle = Math.atan2(dy, dx);
                    const clampedDist = Math.min(distance, maxRadius);
                    
                    const knobX = Math.cos(angle) * clampedDist;
                    const knobY = Math.sin(angle) * clampedDist;
                    
                    joystickKnob.style.transform = `translate(${knobX}px, ${knobY}px)`;
                    
                    moveVector.x = Math.cos(angle) * (clampedDist / maxRadius);
                    moveVector.z = Math.sin(angle) * (clampedDist / maxRadius);
                }
            }
        }, { passive: true });

        canvasContainer.addEventListener('touchend', () => {
            joystickActive = false;
            joystickKnob.style.transform = `translate(0px, 0px)`;
            moveVector.set(0, 0, 0); 
        });

        startBtn.addEventListener('click', () => {
            menuScreen.classList.add('hidden');
            gameScreen.style.display = 'flex';
            setupThreeEngine();
            initNewGame();
        });

        retryBtn.addEventListener('click', () => {
            canvasOverlay.style.display = 'none';
            initNewGame();
        });

        function setupThreeEngine() {
            if (scene) return;
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x08090c);
            scene.fog = new THREE.FogExp2(0x08090c, 0.015);

            camera = new THREE.PerspectiveCamera(60, 16/10, 0.1, 1000);
            camera.position.set(0, 22, 16);
            camera.lookAt(0, 0, -2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            const rect = canvasContainer.getBoundingClientRect();
            renderer.setSize(rect.width, rect.width * (10/16));
            canvasContainer.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            const gridHelper = new THREE.GridHelper(ARENA_SIZE * 2, 30, 0x262c3a, 0x161a22);
            gridHelper.position.y = -0.49;
            scene.add(gridHelper);

            const floorGeo = new THREE.BoxGeometry(ARENA_SIZE * 2, 0.2, ARENA_SIZE * 2);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x0b0d10, roughness: 0.8 });
            const arenaFloor = new THREE.Mesh(floorGeo, floorMat);
            arenaFloor.position.y = -0.6;
            scene.add(arenaFloor);

            window.addEventListener('resize', () => {
                const w = canvasContainer.clientWidth;
                renderer.setSize(w, w * (10/16));
                camera.aspect = 16/10;
                camera.updateProjectionMatrix();
            });
        }

        function initNewGame() {
            enemies.forEach(e => scene.remove(e.mesh));
            projectiles.forEach(p => scene.remove(p.mesh));
            particles.forEach(pt => scene.remove(pt.mesh));
            if (playerObj) scene.remove(playerObj);

            enemies = []; projectiles = []; particles = [];
            score = 0; currentWave = 1; playerHealth = 100;
            gameActive = true;

            const pGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const pMat = new THREE.MeshStandardMaterial({ color: 0x3effbe, roughness: 0.2, emissive: 0x11aa77 });
            playerObj = new THREE.Mesh(pGeo, pMat);
            playerObj.position.set(0, 0.1, 0);
            scene.add(playerObj);

            updateUIElements();
            runWaveSpawningLogic();
            renderFrameLoop();
        }

        function updateUIElements() {
            waveDisplay.textContent = currentWave;
            healthDisplay.textContent = Math.max(0, playerHealth);
            scoreDisplay.textContent = score;
        }

        function fireProjectile() {
            raycaster.setFromCamera(pointer2D, camera);
            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(planeTarget, intersectPoint);

            const direction = new THREE.Vector3().subVectors(intersectPoint, playerObj.position);
            direction.y = 0; 
            direction.normalize();

            if (!isMobile) {
                playerObj.lookAt(intersectPoint.x, playerObj.position.y, intersectPoint.z);
            }

            const bGeo = new THREE.SphereGeometry(0.2, 8, 8);
            const bMat = new THREE.MeshBasicMaterial({ color: 0xffff55 });
            const bulletMesh = new THREE.Mesh(bGeo, bMat);
            bulletMesh.position.copy(playerObj.position);
            scene.add(bulletMesh);

            projectiles.push({
                mesh: bulletMesh,
                velocity: direction.multiplyScalar(0.5)
            });
        }

        function runWaveSpawningLogic() {
            clearInterval(spawnTimer);
            let poolCount = 5 + (currentWave * 3);
            let spawned = 0;

            spawnTimer = setInterval(() => {
                if (!gameActive || spawned >= poolCount) {
                    clearInterval(spawnTimer);
                    return;
                }

                const angle = Math.random() * Math.PI * 2;
                const spawnDistance = ARENA_SIZE - 2;
                const x = Math.cos(angle) * spawnDistance;
                const z = Math.sin(angle) * spawnDistance;

                const eGeo = new THREE.ConeGeometry(0.6, 1.4, 4);
                const eMat = new THREE.MeshStandardMaterial({ color: 0xff3e3e, roughness: 0.3, emissive: 0x440000 });
                const enemyMesh = new THREE.Mesh(eGeo, eMat);
                enemyMesh.position.set(x, 0.2, z);
                enemyMesh.rotation.x = Math.PI / 2;
                scene.add(enemyMesh);

                enemies.push({
                    mesh: enemyMesh,
                    speed: 0.05 + Math.min(currentWave * 0.005, 0.05),
                    health: 1 + Math.floor(currentWave / 4)
                });
                spawned++;
            }, 1000 - Math.min(currentWave * 40, 600));
        }

        function spawn3DExplosion(posVector, hexColor) {
            const pCount = 8;
            const pGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            const pMat = new THREE.MeshBasicMaterial({ color: hexColor });

            for(let i=0; i < pCount; i++) {
                const mesh = new THREE.Mesh(pGeo, pMat);
                mesh.position.copy(posVector);
                scene.add(mesh);

                particles.push({
                    mesh: mesh,
                    life: 1.0,
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.2,
                        (Math.random()) * 0.2, 
                        (Math.random() - 0.5) * 0.2
                    )
                });
            }
        }

        function renderFrameLoop() {
            if (!gameActive) return;
            requestAnimationFrame(renderFrameLoop);

            // 1. Unified Movement Processing (Joystick or Keyboard)
            const speedScale = 0.2;
            if (isMobile && joystickActive) {
                playerObj.position.x += moveVector.x * speedScale;
                playerObj.position.z += moveVector.z * speedScale;
                
                // On mobile, point player in direction of joystick movement
                const lookTarget = new THREE.Vector3().copy(playerObj.position).add(moveVector);
                playerObj.lookAt(lookTarget.x, playerObj.position.y, lookTarget.z);
            } else {
                // Desktop Keyboard Handling
                if (keys['w'] || keys['arrowup']) playerObj.position.z -= speedScale;
                if (keys['s'] || keys['arrowdown']) playerObj.position.z += speedScale;
                if (keys['a'] || keys['arrowleft']) playerObj.position.x -= speedScale;
                if (keys['d'] || keys['arrowright']) playerObj.position.x += speedScale;

                // Desktop Mouse Aiming orientation 
                raycaster.setFromCamera(pointer2D, camera);
                const targetLook = new THREE.Vector3();
                raycaster.ray.intersectPlane(planeTarget, targetLook);
                playerObj.lookAt(targetLook.x, playerObj.position.y, targetLook.z);
            }

            // Boundary Bounds Limits
            playerObj.position.x = Math.max(-ARENA_SIZE + 1, Math.min(ARENA_SIZE - 1, playerObj.position.x));
            playerObj.position.z = Math.max(-ARENA_SIZE + 1, Math.min(ARENA_SIZE - 1, playerObj.position.z));

            // Smooth dynamic camera tracking follows player coordinate variables
            camera.position.x = playerObj.position.x;
            camera.position.z = playerObj.position.z + 16;

            // 2. Projectiles Update
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                proj.mesh.position.add(proj.velocity);

                if (proj.mesh.position.length() > ARENA_SIZE * 1.5) {
                    scene.remove(proj.mesh);
                    projectiles.splice(i, 1);
                }
            }

            // 3. Particles Update
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.velocity);
                p.life -= 0.04;
                p.mesh.scale.setScalar(p.life);

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            // 4. Enemy Processing Loop
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                
                const dir = new THREE.Vector3().subVectors(playerObj.position, enemy.mesh.position);
                dir.y = 0;
                dir.normalize();
                enemy.mesh.position.add(dir.multiplyScalar(enemy.speed));
                enemy.mesh.lookAt(playerObj.position.x, enemy.mesh.position.y, playerObj.position.z);
                enemy.mesh.rotateX(Math.PI / 2); 

                const distToPlayer = enemy.mesh.position.distanceTo(playerObj.position);
                if (distToPlayer < 1.2) {
                    playerHealth -= 20;
                    updateUIElements();
                    spawn3DExplosion(enemy.mesh.position, 0xff3e3e);
                    scene.remove(enemy.mesh);
                    enemies.splice(i, 1);

                    if (playerHealth <= 0) {
                        triggerGameOverSequence();
                        return;
                    }
                    continue;
                }

                for (let j = projectiles.length - 1; j >= 0; j--) {
                    const proj = projectiles[j];
                    const distToProj = enemy.mesh.position.distanceTo(proj.mesh.position);

                    if (distToProj < 0.9) {
                        enemy.health--;
                        spawn3DExplosion(proj.mesh.position, 0xffaa44);
                        scene.remove(proj.mesh);
                        projectiles.splice(j, 1);

                        if (enemy.health <= 0) {
                            spawn3DExplosion(enemy.mesh.position, 0xff3e3e);
                            scene.remove(enemy.mesh);
                            enemies.splice(i, 1);
                            score += 150;
                            updateUIElements();
                        }
                        break;
                    }
                }
            }

            if (enemies.length === 0 && gameActive && spawnTimer && spawnTimer._destroyed) {
                currentWave++;
                updateUIElements();
                runWaveSpawningLogic();
            }

            renderer.render(scene, camera);
        }

        function triggerGameOverSequence() {
            gameActive = false;
            clearInterval(spawnTimer);
            document.getElementById('overlay-text').textContent = `You survived up to Wave ${currentWave} with a final score of ${score}.`;
            canvasOverlay.style.display = 'flex';
        }
    </script>
</body>
</html>
